name: Android Debug APK

on:
  pull_request:
    paths:
      - "apps/musicd-android/**"
      - ".github/workflows/android-debug-apk.yml"
  push:
    branches: [ "main" ]
    paths:
      - "apps/musicd-android/**"
      - ".github/workflows/android-debug-apk.yml"
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: apps/musicd-android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: musicd-android-debug-apk-${{ github.sha }}
          path: apps/musicd-android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
