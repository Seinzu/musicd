global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - 127.0.0.1:9090

  - job_name: musicd
    metrics_path: /metrics
    static_configs:
      - targets:
          - 127.0.0.1:8787

  # Optional future host metrics if you later add a node exporter container on Unraid.
  # - job_name: node
  #   static_configs:
  #     - targets:
  #         - 127.0.0.1:9100
